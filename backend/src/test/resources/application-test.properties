# Test configuration — overrides application.properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for unit tests (JPA creates tables)
spring.flyway.enabled=false

# Disable Redis autoconfiguration for unit tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# App
app.base-url=http://localhost:8080
snowflake.machine-id=1

logging.level.com.urlshortener=WARN
logging.level.org.springframework=WARN
