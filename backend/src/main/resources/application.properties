# =============================================
# URL Shortener - Application Configuration
# =============================================

# Server
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.http2.enabled=true

# Application
app.base-url=${APP_BASE_URL:http://localhost:8080}
spring.application.name=url-shortener

# =============================================
# DATABASE (PostgreSQL)
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=URLShortenerPool

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================
# REDIS
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-wait=1000ms

# =============================================
# RATE LIMITING
# =============================================
ratelimit.create.limit=10
ratelimit.redirect.limit=200
ratelimit.analytics.limit=30

# =============================================
# SNOWFLAKE ID
# =============================================
# Each EC2 instance gets a unique machine ID (0-1023)
# Set via environment variable or AWS instance metadata
snowflake.machine-id=${SNOWFLAKE_MACHINE_ID:1}

# =============================================
# ACTUATOR / METRICS
# =============================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=url-shortener
management.prometheus.metrics.export.enabled=true

# =============================================
# CORS
# =============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# =============================================
# LOGGING
# =============================================
logging.level.com.urlshortener=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
