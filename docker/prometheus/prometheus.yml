global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'url-shortener'

scrape_configs:
  - job_name: 'url-shortener-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'spring-boot'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
